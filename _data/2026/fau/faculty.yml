- name: "David Newman" # Add faculty name here.
  image: /assets/images/Capture.PNG  # Add faculty image to assets/images/ and update here.
  bio: "David Newman, PhD, is a Professor and Biostatistician at Christine E. Lynn College of Nursing, Florida Atlantic University. He is also one of the seven faculty members assigned to the Biostatistician Core and helps to support research across the university.  Dr. Newman has more than 100 scholarly publications, teaches advanced statistics and research methodology classes in the Ph.D. program with a focus on longitudinal data analysis using generalized linear mixed models, latent growth models, and machine learning and AI models. Dr. Newman is the principal investigator or co-investigator on multiple NIH and other federal, state, and foundation grants.  His research aligns with two of FAU's research pillars, the Institute for Human Health and Disease Intervention (I-HEALTH) and the Institute for Sensing and Embedded Network Systems Engineering (I-SENSE). Dr. Newman’s CON’s research focuses on areas of aging across the lifespan, with a concentration on geriatrics, cognitive functioning, physical functioning, and pain management. The partnership between I-HEALTH and I-SENSE has enabled Dr. Newman and his co-researchers to obtain more precise continuous measurements of key variables, thereby enhancing the accuracy and stability of the models.  " # Add faculty bio here.
  website: https://www.linkedin.com/in/david-newman-ph-d-5b275672/  # Link faculty website here.

