- name: "Debarshi Datta" # Add faculty name here.
  image: /assets/images/Dr.Debarshi Datta_cropped.JPG  # Add faculty image to assets/images/ and update here.
  bio: "Debarshi Datta, PhD, is an Assistant Professor in Data Science at the Christine E. Lynn College of Nursing, Florida Atlantic University. He completed a PhD in Experimental Psychology at the Charles E. Schmidt College of Science, Florida Atlantic University. Dr. Datta has experience developing AI-driven decision-support systems for healthcare data, including understanding problem statements, handling disputes, conducting exploratory data analysis, building models, and data visualization and storytelling. Dr. Datta’s current research focuses on data-driven domains, such as AI/ML, to understand population-based disease prognosis. His primary research contribution has been to determine the severity of the disease, inform decision-making for developing a model that comprehends the most significant features predicting mortality and disease severity, and to utilize traditional AI/ML techniques such as decision trees, random forests, XGBoost, and deep learning. In other research, he is developing a model to predict dementia early. Dr. Datta has received numerous intramural grants, including Early Prediction of Alzheimer's Disease and Related Dementias on Preclinical Assessment Data using Machine Learning tools; Seed Funding from Smart Health for COVID-19 research; NSF I-Corps Customer Discovery Funding; and the ALL of US Institutional Champion Award, among many others." # Add faculty bio here.
  website: https://www.linkedin.com/in/dattadebarshi/  # Link faculty website here.

