- name: "Subhosit Ray" # Add faculty name here.
  image: /assets/images/Ray.png  # Add faculty image to assets/images/ and update here.
  bio: "Subhosit Ray, PhD, is a Senior Research Fellow in Data Science at the Christine E. Lynn College of Nursing, Florida Atlantic University. His research applies computational methods and machine learning to large-scale social and health datasets, including geospatial and GPS-derived behavioral data and population-scale electronic health records. His work focuses on identifying patterns of human behavior and health outcomes using data-driven approaches, with applications in detecting cognitive change, modeling disease risk, and understanding population-level health dynamics.
Dr. Ray’s recent research includes developing explainable machine learning models using large-scale research platforms such as the All of Us Research Workbench to identify early predictors of Alzheimer’s disease and related dementias. He has also contributed to predictive modeling and interpretable machine learning approaches to study disease severity in infectious diseases such as COVID-19.
Dr. Ray completed his PhD in the Department of Psychology at Florida Atlantic University, where his doctoral research focused on developing self-organizing deep learning architectures for reinforcement learning using graph cellular automata. In addition to his work in healthcare data science, he has experience in biomedical signal processing, including analyzing EEG signals to study the frequency dynamics of visual attention and developing computational approaches to analyze ECG data for identifying sources of atrial fibrillation.
Dr. Ray has contributed to several funded research initiatives, including projects supported by the All of Us Research Program and pilot funding programs focused on Alzheimer’s disease and related dementias. At the Summer Institute in Computational Social Science (SICSS), he serves as an instructor and mentor, supporting participants in applying computational and machine learning methods to interdisciplinary social science research." # Add faculty bio here.
  website: https://www.fau.edu/research-admin/postdoc-affairs/postdoc-bios/postdoc-bio-subhosit-ray/  # Link faculty website here.

