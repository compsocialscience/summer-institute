- name: "Hanh Phan" # Replace with participant name.
  image: /assets/images/Hanh.jpg  # Add participant image to assets/images/ and update here.
  bio: " Hanh Phan is an Assistant Professor of Finance at Chatham University. Her research interests include corporate finance, real estate, and sustainability. She earned her Ph.D. in Finance and Real Estate from the University of Texas at Arlington and her Master's in Financial Management from Tilburg University. "  # Add participant bio here.
  website: https://www.linkedin.com/in/hanh-phan-bb897a8b/  # Link participant website here.

  - name: "Michelle Knecht" # Replace with participant name.
  image: /assets/images/Michelle.jpg  # Add participant image to assets/images/ and update here.
  bio: " Michelle Keba Knecht is the Senior Medical Librarian for the Schmidt College of Medicine at Florida Atlantic University and a doctoral student in the Department of Curriculum and Instruction. Her research uses Legitimation Code Theory to examine code clashes between healthcare professionals and breast cancer survivors. "  # Add participant bio here.
  website: https://www.linkedin.com/in/michellekeba/  # Link participant website here.

  - name: "Shanting Chen" # Replace with participant name.
  image: /assets/images/Shanting.jpg  # Add participant image to assets/images/ and update here.
  bio: " Shanting Chen is an Assistant Professor of Psychology at the University of Florida. She studies how life experiences get under the skin—using machine learning and epigenomics to understand why chronic stress accelerates aging and increases chronic disease risk, particularly among marginalized populations. "  # Add participant bio here.
  website: https://www.linkedin.com/in/shanting-c-3aa0168a/  # Link participant website here.

  - name: "Aida Ashtari Nakhaee" # Replace with participant name.
  image: /assets/images/Aida.jpg  # Add participant image to assets/images/ and update here.
  bio: " Aida Ashtari is a Ph.D. candidate in Economics at Florida International University. Her research interests lie at the intersection of health economics, public economics, and policy evaluation, with a focus on health insurance, maternal health, nutrition, physical activity, fitness, and the broader determinants of health and well-being. "  # Add participant bio here.
  website: https://www.linkedin.com/in/aida-ashtari-nakhaee-772377ab/  # Link participant website here.

  - name: "Judyta Kociolek" # Replace with participant name.
  image: /assets/images/Judyta.jpg  # Add participant image to assets/images/ and update here.
  bio: " Judyta Kociolek is an oncology nurse with 10+ years of experience. She earned a master’s degree in Nursing Administration and Financial Leadership from Florida Atlantic University in 2019 and has served as Director of Clinical Research Unit Operations since 2023. She is also a PhD student at Christine E. Lynn College of Nursing. "  # Add participant bio here.
  website: https://orcid.org/0009-0000-6159-8526  # Link participant website here.

  - name: "Ana Bravo" # Replace with participant name.
  image: /assets/images/Ana.jpg  # Add participant image to assets/images/ and update here.
  bio: " Ana Bravo is a Senior Research Associate from the Department of Public Health Sciences at the University of Miami. Her research focuses on social network analysis methods, HIV prevention, and health communication among Latino communities. Her work integrates statistical modeling and network analysis to support community research in Florida.  "  # Add participant bio here.
  website: www.linkedin.com/in/anabravobiostats  # Link participant website here.

  - name: "Sumarga Sah Tyagi" # Replace with participant name.
  image: /assets/images/Sumarga.jpg  # Add participant image to assets/images/ and update here.
  bio: " Sumarga Kumar Sah Tyagi (M’19) is an Assistant Professor at Florida A&M University specializing in AI, cybersecurity, IoT/IIoT, biomedical informatics, and NGS analytics. His research focuses on Bio-Cybernetics, deep learning, and genomics. He has held international academic roles and serves as editor, reviewer, and committee member. "  # Add participant bio here.
  website: https://www.linkedin.com/in/sumarga/  # Link participant website here.

