- name: "Edita Folfas"
  image: /assets/images/placeholderPic.png
  bio: "Edita Folfas graduated with her Ph.D. in Quantitative Biology in 2025 from the University of Texas at Arlington. She is currently a Postdoctoral Researcher at Florida Atlantic University in the Department of Biological Sciences. Her research focuses on the ways that resource availability and species interactions work together to shape animal behavior and community structure. She is especially interested in niche partitioning and the mechanisms that allow for multiple competing species to stably coexist. She uses a combination of statistical modelling, field observations, in-lab experiments, and cutting-edge deep learning tools paired with video analysis to achieve these goals. She uses lizards as a system to explore these questions, as they are a diverse group of animals that are also very fun to work with!"
  website: www.google.com
