- name: "Ana Aleksandric" # Speaker name goes here.
  image: /assets/images/Ana.png  # Upload speaker image to /assets/images/ and update URL here.
  bio: "Ana Aleksandric is an Assistant Professor of Teaching at FAU. Her research is highly interdisciplinary at the intersection of data and social sciences, and public health informatics. Her research focuses on user behavior in toxic online conversations and social media discourse on public health topics, including women’s health and diabetes." # add speaker bio here
