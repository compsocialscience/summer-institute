- name: "Timothy Dye" # Speaker name goes here.
  image: /assets/images/Timothy.png  # Upload speaker image to /assets/images/ and update URL here.
  bio: "Timothy Dye, PhD, JD is Professor and Chair of Population Health at Florida Atlantic University's Schmidt College of Medicine and a licensed attorney. His work converges AI, international law, and health, spanning LLM-based measurement of social phenomena, health attitudes, and epidemiology. Grounded in data diplomacy and international law, he often works with consent, sovereignty, and bias." # add speaker bio here
