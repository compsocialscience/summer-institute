- name: "Sarah Wu"
  image: /assets/images/2026/stanford/people-sarah-wu.jpg
  bio: "Sarah is a PhD student in the Stanford Communication Department, focusing on media psychology. Her research examines the psychological consequences of people's engagement with digital technologies (e.g., AI, social media), particularly in educational and creative contexts."
