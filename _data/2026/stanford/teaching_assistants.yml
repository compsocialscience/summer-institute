- name: "Aya Salim"
  image: /assets/images/2026/stanford/people-aya-salim.jpg
  bio: "Aya is a PhD student in Media Psychology in the Department of Communication at Stanford. Her research explores how people process and respond to information in complex media environments. She is particularly interested in social norms, political psychology, misinformation, and how media shape attitudes and decision-making."
  website: https://www.linkedin.com/in/ayasalim