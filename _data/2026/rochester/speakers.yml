- name: "Keynote Speaker: Andrew Q. Philips" # Speaker name goes here.
  image: /assets/images/andrew_q_phillips.jpg  # Upload speaker image to /assets/images/ and update URL here.
  bio: "Andrew Q. Philips is Professor of Political Science at the University of Colorado Boulder, where he holds the Henry W. Ehrmann Endowed Professorship in Law and Jurisprudence and serves as a Fellow in the Institute of Behavioral Science. Before joining Colorado, he earned a BA in Political Science from the University of Vermont in 2011 and a PhD in Political Science from Texas A&M University in 2017, with concentrations in comparative politics and political methodology. His research focuses on political economy and methodology, with substantive interests in public budgets, representation, and the political consequences of economic risk. Much of his work brings careful quantitative methods to questions about government spending, women’s representation, dynamic modeling, and public opinion. He is the coauthor, with Christine S. Lipsmeyer and Guy D. Whitten, of The Politics of Budgets: Getting a Piece of the Pie, published by Cambridge University Press in 2023. His recent work includes articles on electoral quotas in India, labor market risk and policy preferences, compositional volatility, Monte Carlo learning, and the interpretation of ARCH and GARCH models. He has also developed software and teaching materials in Stata and R, including tools such as dynamac, dynsimpie, mkduration, and qdmean. In addition to his research, Philips has taught a wide range of methods courses at Colorado and in major summer training programs, including time series, pooled time series, panel and longitudinal analysis, maximum likelihood, machine learning, and statistical programming."
  website: https://www.colorado.edu/polisci/people/faculty/andrew-q-philips # update speaker personal link here

- name: "Yasemin Celikkol" # Speaker name goes here.
  image: /assets/images/yasemin_celikkol.jpg  # Upload speaker image to /assets/images/ and update URL here.
  bio: "Yasemin Y. Celikkol is Assistant Professor in Residence at Northwestern University in Qatar, with a joint appointment in Communication and Liberal Arts. She is affiliated with the Institute for Advanced Study in the Global South, serves on the Board of Advisors of the Center for Advanced Research in Global Communication at the University of Pennsylvania, and is Reviews Editor of the Middle East Journal of Culture and Communication. A scholar of global communication, her research focuses on the intersection of communication, culture, and geopolitics, with recent work on the geopolitics of globalized Turkish television series, as well as fashion and hegemony, published in journals such as the International Journal of Communication, Critical Studies in Media Communication, International Journal of Cultural Studies, and Fashion Theory. In Turkey, she is also known for her work on baby sign language and positive discipline; her book on baby sign language was the first of its kind to be widely available in bookstores and was recognized by the Deaf community and disability advocacy organizations. She received her PhD in Communication from the Annenberg School for Communication at the University of Pennsylvania in 2021, and her teaching emphasizes connecting theory to practice while mentoring students to engage thoughtfully with global communication in real-world settings."
  website: https://www.qatar.northwestern.edu/directory/profiles/celikkol-yasemin.html # update speaker personal link here

- name: "Da Gong" # Speaker name goes here.
  image: /assets/images/da_gong.jpg  # Upload speaker image to /assets/images/ and update URL here.
  bio: "Da Gong is Lecturer of Data Analytics in the School of Business at SUNY Geneseo. He received his PhD in Economics from the University of California, Riverside in 2024, after earning an MA in History from the Chinese Academy of Social Sciences and a BA in Business Administration from Hunan University. His research spans development economics, public economics, political economy, culture and institutions, labor economics, and applied machine learning. Much of his work focuses on how large-scale policies and institutions shape economic outcomes, social behavior, and public beliefs. His recent publications examine the effects of China’s Zero-COVID policies on economic activity, student performance, and labor market outcomes, with articles published in China Economic Review, Journal of Asian Economics, and Journal of Labor Research. His ongoing research includes projects on famine experience and trust, public responses to political communication during the pandemic, bureaucratic incentives in crisis control, air pollution and sleep, and reproducibility and replicability in economics and political science. Before joining SUNY Geneseo, he also served as Lead Consultant at UC Riverside’s Graduate Quantitative Methods Center, where he supported graduate students and researchers on quantitative methods, programming, and research design. In addition to his research, he teaches courses in data analytics, Python, business and economic statistics, and information systems management, reflecting a scholarly background that combines substantive interests in political economy with strong quantitative and computational training."
  website: https://www.geneseo.edu/business/da-gong/ # update speaker personal link here

- name: "Jon Herington" # Speaker name goes here.
  image: /assets/images/jon_herington.jpg  # Upload speaker image to /assets/images/ and update URL here.
  bio: "Jonathan Herington is an Assistant Professor of Health Humanities & Bioethics at the University of Rochester, with secondary appointments in Philosophy and affiliation with the Goergen Institute of Data Science. His research sits at the intersection of bioethics, AI ethics, and political philosophy, with a particular focus on the governance of health technologies, fairness in machine learning, research ethics, and resource allocation during health emergencies. He teaches and writes on questions about data, algorithms, justice, and the social implications of emerging technologies. Before joining Rochester, he held positions at Kansas State University and the University of Birmingham. He earned his PhD in philosophy from the Australian National University and previously studied philosophy, international relations, and microbiology at the University of Queensland."
  website: https://jherington.com/ # update speaker personal link here

- name: "George Mikros" # Speaker name goes here.
  image: /assets/images/george_mikros.jpg  # Upload speaker image to /assets/images/ and update URL here.
  bio: "George Mikros is Professor in the MA Program in Digital Humanities and Societies at Hamad Bin Khalifa University’s College of Humanities and Social Sciences. Before joining HBKU, he was Professor of Computational and Quantitative Linguistics at the National and Kapodistrian University of Athens. He also directs the Computational Stylistics Lab and serves as an Adjunct Professor in the Department of Applied Linguistics at the University of Massachusetts Boston. Earlier in his career, he worked as a Research Associate at the Institute for Language and Speech Processing, where he contributed to the development of important language resources and natural language processing tools for Modern Greek. Since 1999, he has also taught at the Hellenic Open University, where he directed the undergraduate program in Spanish Language and Literature. Professor Mikros has authored five monographs and more than eighty scholarly publications in journals, conference proceedings, and edited volumes. He has long played a leading role in the International Association of Quantitative Linguistics, serving on its council since 2007 and becoming President in 2018. He is a frequent keynote and invited speaker at international conferences, workshops, and summer schools in digital humanities and quantitative linguistics. His work is well known for combining linguistic theory with quantitative methods to study authorship, variation, and textual evidence. His research focuses on computational stylistics, quantitative linguistics, computational linguistics, and forensic linguistics. At SICSS Rochester, he brings deep expertise in language, text, and measurement, along with a strong record of building bridges across linguistics, computation, and the digital humanities."
  website: https://www.hbku.edu.qa/en/chss/staff/george-mikros # update speaker personal link here

- name: "Gourab Ghoshal" # Speaker name goes here.
  image: /assets/images/gourab_ghoshal.jpeg  # Upload speaker image to /assets/images/ and update URL here.
  bio: "Gourab Ghoshal is a Professor of Physics and Astronomy with a joint appointment in the Department of Computer Science. Prior to joining his current institution, he was a Research Scientist in the Department of Earth and Planetary Sciences at Harvard University and a member of Harvard's multidisciplinary Origins of Life initiative. Originally from New Delhi, India, Ghoshal earned his BSc and MSc in Theoretical Physics from the University of London in 2004. He completed his PhD in Physics at the University of Michigan, Ann Arbor in 2009, during which he also attended the prestigious Complex Systems Summer School at the Santa Fe Institute in New Mexico and the Theoretical Physics School at Les Houches in France. Following his PhD, he held postdoctoral positions at Northeastern University and Harvard Medical School, and was a visiting scientist at the MIT Media Lab. Trained as a statistical physicist, Ghoshal conducts research in complex systems, with interests spanning the theory and applications of complex networks, non-equilibrium statistical physics, game theory, econophysics, dynamical systems, and the origins of life. He is the editor of a book on complex networks published by Springer, and his work has appeared in leading journals such as Nature, Science, and Physical Review Letters."
  website: https://www.pas.rochester.edu/people/faculty/ghoshal_gourab/ # update speaker personal link here

- name: "Kenneth Joseph" # Speaker name goes here.
  image: /assets/images/kenneth_joseph.jpg  # Upload speaker image to /assets/images/ and update URL here.
  bio: "Kenneth Joseph is an Associate Professor in the Department of Computer Science and Engineering and the Department of AI and Society at the University at Buffalo, where he also serves as Associate Director of AI and Society in the Institute for Artificial Intelligence and Data Science. He leads the computation and equity lab, or cUBelab, where he and his collaborators study social inequality through computational methods and develop tools that help researchers better understand complex social problems. His work sits at the intersection of computer science and the social sciences. Drawing on machine learning, natural language processing, simulation, and network analysis, he studies topics such as stereotypes and prejudice, political misinformation, gender bias in organizations, social inequality, disaster response, and patterns of news and social media use. A central theme of his research is how computational approaches can help explain social divides and support work that benefits society. Before joining the University at Buffalo in 2018, Joseph held research positions at Northeastern University and Harvard’s Institute for Quantitative Social Science. He was also a Data Science for Social Good Fellow at the University of Chicago. He earned his PhD and MS in Societal Computing from Carnegie Mellon University and his BS in Computer Science from the University of Michigan. In addition to his research, Joseph is widely recognized for his teaching and mentorship. His honors include the University at Buffalo’s Exceptional Scholar Young Investigator Award and the 2025 Meyerson Award for Distinguished Undergraduate Teaching and Mentoring." # add speaker bio here
  website: https://www.buffalo.edu/news/experts/kenneth-joseph-faculty-expert-computing-social-media-societal-impacts-inequality.html

- name: "Timothy Loftus" # Speaker name goes here.
  image: /assets/images/timothy_loftus.jpg  # Upload speaker image to /assets/images/ and update URL here.
  bio: "Timothy Loftus is an undergraduate senior at the University of Rochester completing a BS in computer science with minors in political science and Spanish. In addition to performing research in computational social science, he works as a data scientist for the Lehigh Valley Justice Institute, using data research and working with other organizations to tackle local issues relating to criminal justice and advocacy. His research interests include computer vision, computational social science, and political analysis." # add speaker bio here
  website: https://www.linkedin.com/in/timothy-r-loftus/



  
