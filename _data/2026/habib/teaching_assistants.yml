  bio: "Sandesh Kumar is a senior researcher at Habib University. He graduated from Habib University with Bachelors in Computer Science with AI Specialization. Since then he has been working in the field of AI, constantly upgrading himself, mentoring students and working on various research projects. He has publications in various esteemed local and international conferences including ACL. He is not just limited to AI. During his undergrad he had huge interest in interdisciplinary work so he took various courses from school of Arts Humanities and Social Sciences. He also served as President of Computer Science and Engineering Club, Treasurer of Student Government and Treasurer of AI Club during his undergrad. Right now, he is working in the medical and linguistics domains combination with AI."
