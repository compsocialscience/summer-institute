- name: "Muskan" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Muskan.jpeg  # Add participant image to assets/images/ and update here.
  bio: "Muskan is a final-year Linguistics undergraduate at Bahria University, Karachi, and a Global UGRAD Program alumna. Her research explores the intersection of language, society, and computation, with a focus on how language reflects social distinctions in Pakistan. Her independent study on menu language and social class in Karachi was accepted at ICLAP, and she went on to complete a thesis in computational linguistics — the first undergraduate research of its kind at Bahria University. At SICSS, she aims to apply computational approaches to digital trace data to study language and social meaning in Pakistani society, and to contribute to open Pakistani datasets for computational social science."  # Add participant bio here.
  website: https://www.linkedin.com/in/muskanlnu/  # Link participant website here.

- name: "Muhammad Saleem" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Muhammad_Saleem.png  # Add participant image to assets/images/ and update here.
  bio: "Muhammad Saleem is an Assistant Manager – Technology for Education at The Citizens Foundation (TCF), Pakistan, where he leads the implementation of digital learning programs in underserved school communities, with experience spanning facilitator development, classroom technology integration, and learning analytics. His research sits at the intersection of AI, education, and computational social science, examining how AI-enabled educational technologies can support learning without inducing harmful cognitive offloading — particularly among secondary school students in mathematics classrooms. A central focus of his work is building reproducible datasets from low- and middle-income country contexts to inform the design of responsible AI tutoring systems and evidence-based educational practices."  # Add participant bio here.
  website: https://www.linkedin.com/in/muhammadsaleem112233/ # Link participant website here.

- name: "Naeem Hussain" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Naeem_Hussain.jpeg  # Add participant image to assets/images/ and update here.
  bio: "Naeem Hussain is an MPhil researcher in Government and Public Policy at National Defence University, Islamabad, studying why Pakistan's climate commitments fail at implementation, with a focus on climate governance fragmentation in Gilgit-Baltistan through policy analysis, institutional mapping, and stakeholder interviews. His interests lie at the intersection of computational methods and governance analysis — text analysis, network mapping, and geospatial tools applied to climate policy and water security in South Asia. He is building the Climate and Security Research Institute South Asia, an independent think-do tank, and has published three peer-reviewed papers, including on the Indus River system and glacial lake outburst floods. He is a Green Narrative Fellow, McKinsey Forward Programme participant, and UNU Hub-certified climate action fellow. He joins SICSS-Habib to build the computational skills needed to strengthen evidence-based climate governance research in Pakistan."  # Add participant bio here.
  website: https://www.linkedin.com/in/naeem-hussain99/ # Link participant website here.

- name: "Noor Fatimah" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Noor_Fatimah.jpeg  # Add participant image to assets/images/ and update here.
  bio: "Noor Fatimah is a Sociology and Cultural Studies student with strong interests in research, social development, and public policy. Her work focuses on questions surrounding inequality, gender, religion, education, and marginalized communities in South Asia, approached through a critical and interdisciplinary lens. She is particularly interested in qualitative research and the ways in which culture, identity, and power shape everyday social realities. Alongside her academic pursuits, Noor has actively contributed to student leadership and intellectual engagement through organizing cultural and research-oriented initiatives, discussions, and events. Her interests extend to global development and international organizations working toward meaningful social impact. Combining analytical thinking with creativity and leadership, she aspires to contribute to research and policy spaces that challenge dominant narratives and encourage more inclusive and socially conscious futures."  # Add participant bio here.
  website: # Link participant website here.

- name: "Wajeha Khan" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Wajeha_Khan.jpeg  # Add participant image to assets/images/ and update here.
  bio: "Passionate about creating an impact, I substantially enjoy various disciplines such as history, literature, and philosophy. Following the culmination of my bachelors in Communication and Design from Habib University, I have been on the quest for meaning through experimenting with different fields that have the potential to be a catalyst for positive change by invoking deeper empathy. This is also what inspired my thesis research, 'Mindscapes,' which elaborated upon the boundless intricacies of the human psyche by touching upon different levels of reality or subjectivity through the medium of both traditional art and storytelling. Since then, I have been preoccupied with pressing social concerns and revisited some of my previous research work, particularly relating to animal rights and wellbeing within the scope of our country. I am a writer at heart who wishes to surpass the boundaries and limitations of conventional thinking by making my work as comprehensive as possible, which has motivated me to pursue this program. I aim to build a foundation for my qualitative research and relevant social theory through advancing my understanding of computational methods, ensuring the execution of necessary intervention within Pakistan."  # Add participant bio here.
  website: https://www.linkedin.com/in/wajeha-khan-b09a6b20a/ # Link participant website here.

- name: "Amna Umer" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Amna_Umer.jpg  # Add participant image to assets/images/ and update here.
  bio: "Amna Umer is a Lecturer in Computer Science at UIT University, with over six years of teaching experience and a focus on student-centered, active learning approaches. She holds a Bachelor's in Computer Science from COMSATS and an MS in Information and System Technology from Quaid-i-Azam University. Her research explores the application of AI in programming education, student learning behavior, and AI-inclusive pedagogical techniques. She is currently examining how AI-assisted tools influence student confidence and engagement in computing courses. She also serves as Treasurer of IEEE Women in Engineering Karachi Section and Content and Media Manager for IEEE HTA Region 10 and is active in talks on women's empowerment and humanitarian technology."  # Add participant bio here.
  website: https://www.linkedin.com/in/amna-umer-5a3829241/ # Link participant website here.

- name: "Amrat Haq" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Amrat_Haq.jpg  # Add participant image to assets/images/ and update here.
  bio: "Dr. Amrat Haq is currently serving as Assistant Professor at the Department of Media and Communications Studies, International Islamic University, Islamabad. She has previously served as the Chair for the Department, as well as In-charge Programs for the Faculty of Social Sciences, IIUI. She completed her Doctoral Thesis in 2017 from the School of Communication, Hong Kong Baptist University, HK, studying the desensitizing effects of news violence on audiences in Pakistan. Her primary research interest remains political communication, including studies on political polarization, disinformation, audience trust, social media echo chambers, and the experiences of female politicians online in Pakistan. She has published numerous research papers and has presented her work at both national and international conferences. She is currently expanding her research interests to explore and understand the role of generative AI in both journalism and political communication."  # Add participant bio here.
  website: https://www.linkedin.com/in/amrat-haq-a2644a2/ # Link participant website here.

- name: "Ayesha Ashraf" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Ayesha_Ashraf.jpeg  # Add participant image to assets/images/ and update here.
  bio: "Dr. Ayesha is an Assistant Professor of Economics at The Women University Multan, holding a PhD in Economics from Germany and over eight years of experience teaching and conducting policy research across Pakistan. Her research interests span Macroeconomics, International Trade, Environmental Economics, and Public Sector Economics, while her research interests cover International Economics, FDI, Development Economics, Women Empowerment, and Computational Social Science. She has published over 30 refereed articles in international journals and managed numerous government-commissioned and externally funded research projects. She is particularly interested in interdisciplinary collaborations integrating Economics, Data Science, and Computational Social Science to address complex policy and development challenges."  # Add participant bio here.
  website: https://www.linkedin.com/in/ayesha-ashraf-376b4080/ # Link participant website here.

