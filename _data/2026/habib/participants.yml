- name: "Fatin Nawaz" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Fatin_Nawaz.jpg  # Add participant image to assets/images/ and update here.
  bio: "Fatin Nawaz is a product design strategist working at the intersection of user experience, systems thinking, and digital product strategy. She is currently at Raqami Islamic Digital Bank, Pakistan's first fully digital Islamic bank, where she designs financial experiences across onboarding, payments, and behavioral product design. With a background in Computer Science from Habib University and a career spent in the messy, beautiful world of fintech, Fatin has built a practice that moves between qualitative research and quantitative product analytics. She works closely with behavioral data; using tools like GA4 and Mixpanel to study how users move through the products she has designed, and is increasingly interested in the gaps that dashboard-level analysis leaves behind. Alongside her industry work, Fatin teaches Interaction Design at the Indus Valley School of Art and Architecture, where she has seen firsthand how the absence of computational fluency limits the questions designers and researchers can ask about the world. At SICSS, she hopes to fill her own computational gaps, particularly in automated text analysis, data scraping, and digital experiments. She is most interested in applying these methods to questions about financial behaviour and inclusion in Pakistan, especially among communities that move money entirely outside formal banking systems."  # Add participant bio here.
  website: https://www.linkedin.com/in/fatinnawaz/ # Link participant website here.  

- name: "Mushtaque Ahmed Rahu" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Mushtaque_Ahmed_Rahu.png  # Add participant image to assets/images/ and update here.
  bio: "Dr. Mushtaque Ahmed Rahu is an accomplished researcher in the field of Electronic Engineering with a strong specialization in Internet of Things (IoT) and Machine Learning. He earned his B.E., M.E., and PhD degrees in Electronic Engineering from Quaid-e-Awam University of Engineering, Science and Technology Nawab Shah. His research interests include Wireless Sensor Networks (WSN), IoT, Machine Learning, Smart Agriculture, and Artificial Intelligence in Education. He is also actively engaged in programming and data analysis using R. Dr. Rahu has an impressive research portfolio with 31 publications in reputed journals, 5 conference papers, and one book chapter to his credit. Beyond academia, Dr. Rahu has contributed extensively to public awareness and educational discourse through 65 published articles in various English newspapers. He regularly participates in continuous professional development activities, including Pakistan Engineering Council Continuous Professional Development (CPD) workshops, and up-to-date knowledge-based trainings and workshops to further enhance his technical and research skills. He has professional memberships in his area interested fields."  # Add participant bio here.
  website: https://www.linkedin.com/in/mushtaque-ahmed-6955b9418/ # Link participant website here. 

- name: "Sarfaraz Ali" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Sarfaraz_Ali.jpeg  # Add participant image to assets/images/ and update here.
  bio: "Sarfaraz Ali is a Pakistani academic and interdisciplinary researcher working at the intersection of social sciences, applied linguistics, and English language education. He is pursuing a fully funded PhD in Social Sciences, focusing on digital media, language, and education in multilingual societies. He holds a Master's in Applied Linguistics from Universitas Diponegoro, Indonesia, and currently serves as Lecturer in English at IBA, Sukkur, and Course Leader for the EaSTE II teacher development program. He has taught at several institutions across Pakistan, including NUML, Begum Nusrat Bhutto Women University Sukkur, and IBA Community College Khairpur, with experience spanning linguistics, TESOL, and academic writing. His research interests include computational social science, sociolinguistics, intercultural communication, and digital pedagogy, and he has published on phonology, semantics, and multilingual language acquisition. He was selected for the U.S. Department of State-sponsored TEA Program at the University of Nebraska Omaha, alongside several fully funded international certifications. At SICSS-Habib 2026, he aims to deepen his engagement with computational methodologies in education and language research."  # Add participant bio here.
  website: https://www.linkedin.com/in/sarfaraz-ali-14bb90202/ # Link participant website here.

- name: "Sarmad Wali Khan" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Sarmad_Wali_Khan.jpg  # Add participant image to assets/images/ and update here.
  bio: "Sarmad Wali Khan teaches Political Science at Government College Balakot, a remote institution in Khyber Pakhtunkhwa, where he brings both scholarly rigor and policy experience to students in underserved regions. His recently completed M.Phil from Government College University Lahore examined how populism shapes democratization in hybrid regimes, with Pakistan as a critical case. Fluent in Urdu, Pashto, Hindko, and English, he works at the intersection of qualitative and computational approaches - particularly interested in how manual discourse analysis can be validated and scaled through computational tools. His broader research agenda spans populism, political communication across South Asia, and the politics of representation. At SICSS Habib, he seeks to build technical capacity in text analysis that will deepen and extend the qualitative work that anchors his scholarship."  # Add participant bio here.
  website: https://www.linkedin.com/in/sarmad-wali-khan-34062aaa/ # Link participant website here. 

- name: "Shahbaz Noor" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Shahbaz_Noor.jpg  # Add participant image to assets/images/ and update here.
  bio: "Shahbaz Noor is an MS Data Science candidate at Muhammad Ali Jinnah University (MAJU), Karachi, originally from Khaplu in Gilgit-Baltistan. His thesis focuses on building the first open-source English-to-Balti neural machine translation system — a pioneering effort for an endangered Sino-Tibetan language with virtually no prior digital language resources. His system combines a fine-tuned MarianMT model with a FAISS-based RAG pipeline, drawing on a parallel corpus that is being actively expanded as data cleaning progresses. His broader research interests lie at the intersection of computational linguistics, low-resource NLP, and digital language preservation, with a focus on supporting endangered languages historically excluded from mainstream AI development. At SICSS-Habib 2026, he hopes to bring these concerns into dialogue with computational social science methods."  # Add participant bio here.
  website: https://www.linkedin.com/in/shahbaznoor27/ # Link participant website here. 

- name: "Sualeh Ali" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Sualeh_Ali.png  # Add participant image to assets/images/ and update here.
  bio: "A graduate of Rochester Institute of Technology and completed my Master’s in Data Science in 2024 under the Fulbright Scholarship program. Currently, I am engaged as a Senior AI Engineer at Careem (Uber), where we are building agentic platforms as part of the GenAI team. Simultaneously, I am also teaching Machine Learning courses at my alma mater, the Institute of Business Administration, as a visiting faculty. My research interest lies in building AI for Social Good and overlaps with Computational Social Science and has published papers to merit this effort (IJCAI 2024)."  # Add participant bio here.
  website: https://www.linkedin.com/in/smsali97/ # Link participant website here. 

- name: "Zubair Mahar" # Replace with participant name.
  image: /assets/images/SICSSHabib_Participant_Zubair_Mahar.jpg  # Add participant image to assets/images/ and update here.
  bio: "Zubair Mahar is a Commonwealth Scholar completing an MA in Educational Leadership at the University of Manchester, where his work sits at the intersection of education systems, institutional governance, and decolonial theory. He is a Teach For Pakistan Alum and the founder of Eduwings, an education access initiative based in Sukkur, Sindh. He also serves as Leadership and Training Director of the Awami Naujawan Civic Empowerment Fellowship, a civic leadership programme connecting young people with grassroots governance structures across interior Sindh. His research interests centre on how institutional power shapes the agency and subjectivity of educators and communities in Pakistan's public education system — questions he approaches through qualitative and action research methods. He is currently co-authoring a paper under review at the Journal of Education Policy exploring teacher subjectivities in government schools through a decolonial lens. At SICSS-Habib, he is interested in exploring how computational methods can illuminate patterns of educational inequity, civic participation, and governance at scale – extending the ground-level work he has conducted across Sindh into larger, data-driven frameworks for systemic change."  # Add participant bio here.
  website: https://www.linkedin.com/in/zubair-mahar/ # Link participant website here.    
