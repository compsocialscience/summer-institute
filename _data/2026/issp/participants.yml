- name: "APPOH Kodzo Edem"
  image: /assets/images/appoh_kodzo_edem.jpg
  bio: "APPOH Kodzo Edem est démographe, sociologue de formation et chercheur, actuellement en stage à l’Unité de Recherche Démographique (URD) de l’Université de Lomé. Son parcours académique comprend des études universitaires en sociologie ainsi qu’une formation en enseignement à l’École Normale d’Instituteurs, ce qui lui a permis de développer une solide base en sciences sociales, en pédagogie et en analyse des dynamiques de population. Formé à l’IFORD au Cameroun, il s’intéresse particulièrement aux dynamiques de population, à la fécondité, aux comportements de santé, à l’utilisation des services et aux déterminants sociaux et territoriaux des inégalités démographiques et sanitaires au Togo. Il a également participé à la quatrième Enquête Démographique et de Santé au Togo, une expérience qui a renforcé son intérêt pour la recherche empirique rigoureuse et l’exploitation des données de grande ampleur au service des politiques publiques."
  website: ""

- name: "ASSOUMA Arouna"
  image: /assets/images/arouna_assouma.jpg
  bio: "Dr. Arouna ASSOUMA is an Agricultural Economist with a Ph.D. in Agricultural Economics. He has over 10 years of experience developing projects, designing development and climate change initiatives, and monitoring and evaluating the impact of projects/programs. He is also a postdoc and Intern Lecturer in the Faculty of Letters, Arts, and Human Sciences and the Agronomy Faculty at the University of Parakou in Benin. Dr. ASSOUMA obtained a grant from Africa Research Impact Network (ARIN) to assess the impact of climate-smart livestock on food security. Dr. ASSOUMA is a data analyst. He conducts data collection, data analysis, and reports. He masters data collection and analysis tools such as KoboToolbox, R, Stata, and SPSS very well. Data analysis methods such as linear regression, logit, probit, propensity score matching, Difference in Difference, Endogenous Switching Regression, and Best-Worst Scaling. Dr. ASSOUMA has a wide range of knowledge in several fields, including Agribusiness Clusters and Climate Change."
  website: https://www.linkedin.com/in/arouna-assouma-ph-d-0a49b218a

- name: "BASSINGA Gaëtan"
  image: /assets/images/bassinga_gaetan.jpg
  bio: "BASSINGA Gaétan est chargé d’études au Centre d’Analyse des politiques Economiques et Sociales (CAPES). A ce poste, il assure l’évaluation des politiques publiques et de la production de notes de politiques sur les réalités actuelles du Burkina Faso. Vu son poste, ses centres de recherches sont diversifiés, alliant la gestion des flux financiers illicites, le contrôle de la pauvreté, la santé sexuelle et reproductive et la gouvernance. Il est titulaire d’un diplôme d’Ingénieur Statisticien Economiste de l’Ecole Nationale de la Statistique et de l’Analyse Economique (ENSAE) et d’un Master en Statistiques et Economie de l’Université Toulouse Capitole. Il bénéficie par ailleurs d’une Admission pour un PHD à ESG UQAM pour la session d’automne 2026."
  website: https://www.linkedin.com/in/gaetan-bassinga/

- name: "BRAH MALAM MAMAN Laouali"
  image: /assets/images/laouali_brah_malam_maman.jpg
  bio: "Laouali BRAH MALAM MAMAN est titulaire d'un doctorat en Gouvernance et Intégration Régionale de l'Université Panafricaine (Yaoundé II-SOA, Cameroun), ainsi que d'un Master international en Planification, option Sociologie du Développement Local et Aménagement du Territoire pour l'Afrique de l'Ouest, obtenu dans la même institution. Il est également titulaire d'une Licence en Géographie de l'Université Abdou Moumouni de Niamey (Niger). Laouali est Chargé de Travaux Dirigés au Département des Sciences Politiques de la Faculté des Sciences Juridiques et Politiques (FSJP) de l'Université Abdou Moumouni de Niamey, et formateur à l'École Nationale d'Administration (ENA) du Niger. Ses travaux de recherche portent sur les dynamiques migratoires, la gouvernance locale, la décentralisation, la prévention de l'extrémisme violent et la résilience communautaire au Sahel. Il est auteur de plusieurs publications scientifiques traitant notamment des transferts monétaires des migrants, de l'émigration des femmes rurales, de l'immigration irrégulière et des mechanisms locaux de résolution des conflits intercommunautaires, et a présenté ses travaux lors de conférences internationales en Afrique et en Europe. Son projet de recherche sur la décentralisation et la gouvernance locale au Niger a été nominé au Prix d'Excellence de Leadership Local (PELL), édition panafricaine de l'OIDP à Dakar en 2025. Laouali exerce également en tant que consultant indépendant auprès d'organisations internationales, dont l'OIM Niger et des programmes financés par l'USAID, avec une spécialisation en planification participative, suivi-évaluation et gouvernance communautaire dans les contextes sahéliens fragiles."
  website: https://www.linkedin.com/in/laouali-brah-2aa5151b3

- name: "DANFI Akomédi David"
  image: /assets/images/danfi_akomedi_david.jpg
  bio: "Akomédi David DANFI est statisticien-économiste à l'African School of Economics (ASE-Bénin), où il poursuit actuellement un Master en Mathématiques, Économie et Statistiques. Il y exerce également comme Analyste de données, appliquant des méthodes de modélisation statistique et d'apprentissage automatique notamment la régression, les arbres de décision et les forêts aléatoires en utilisant R, Stata et Python. Il est également Éducateur pair au sein de COUS-P et de l'UNFPA, où il mène des campagnes de sensibilisation en santé publique fondées sur les données. Engagé dans la recherche reproductible, il a suivi plusieurs formations du DIME de la Banque mondiale portant sur les fondamentaux de la recherche reproductible, la science comportementale appliquée aux politiques publiques et la gestion de la recherche de terrain. Ses intérêts de recherche se situent à l'intersection des sciences sociales computationnelles et des politiques publiques en Afrique de l'Ouest, avec un focus particulier sur les déterminants de la réussite scolaire, les disparités de genre et l'abandon scolaire. Il possède également une solide expérience en visualisation de données avec R Shiny et Power BI. David est titulaire d'une Licence en Mathématiques et Informatique de l'École Normale Supérieure de l'UNSTIM-Bénin et est affilié à l'African School of Economics à Cotonou, au Bénin."
  website: https://www.linkedin.com/in/david-danfi?utm_source=share_via&utm_content=profile&utm_medium=member_ios

- name: "DIOP Mame Saye"
  image: /assets/images/diop_mame_saye.jpg
  bio: "Je m’appelle Mame Saye Diop, titulaire d’une maîtrise en ingénierie du développement territorial et d’une licence en économie appliquée. Passionnée par le développement communautaire, la participation citoyenne et les questions environnementales, j’ai acquis des expériences en collecte et analyse de données, mobilisation communautaire et suivi de projets à travers plusieurs ONG, enquêtes de terrain et projets universitaires. J’ai notamment travaillé avec l’ANSD, BudgIT et différents projets de recherche territoriale. Sérieuse, engagée et dynamique, je souhaite contribuer à des initiatives innovantes ayant un impact positif sur les communautés, particulièrement dans les domaines du climat, du développement durable et de l’autonomisation des jeunes."
  website: https://www.linkedin.com/in/mame-saye-diop-414018239

- name: "DOUT Hamitande"
  image: /assets/images/dout_hamitande.jpg
  bio: "Hamitande Dout est Enseignant-Chercheur en Économie à l’Université de Lomé, où il enseigne depuis 2023. Il est titulaire d’un doctorat en économie de l’Université de Lomé (2020) et a effectué un stage postdoctoral à l’Université du Québec à Trois-Rivières (Canada) entre 2021 et 2022. Ses recherches se situent à l’intersection de l’économie du développement et des politiques publiques, avec des intérêts particuliers pour l’économie de l’éducation, l’inclusion sociale et financière, la résilience face aux chocs, l’évaluation d’impact et les populations déplacées de force. Il est auteur de plusieurs publications scientifiques évaluées par les pairs dans des revues classées par le CNRS. Au cours de sa carrière, il a dirigé et contribué à des projets de recherche en collaboration avec des institutions nationales et internationales, notamment la Cellule Climat des Affaires de la Présidence de la République togolaise, le Centre Autonome d’Études et de Renforcement des Capacités pour le Développement au Togo (CADERDT), la Banque mondiale, l’Agence Française de Développement (AFD) et le Global Development Network (GDN). Hamitande ést membre du Centre de Recherche en Économie Appliquée et Management des Organisations (CREAMO) de l’Université de Lomé, de l’Econometric Society et du Réseau des jeunes économistes de la United Nations Economic Commission for Africa, des affiliations qui soutiennent son engagement au sein de la communauté internationale des chercheurs en économie."
  website: https://sites.google.com/view/douth/accueil?authuser=0

- name: "GBEGNON Komlan Olakossan"
  image: /assets/images/gbegnon_komlan_olakossan.jpg
  bio: "GBEGNON Komlan Olakossan est docteur en économie du développement au Laboratoire de Recherche en Sciences Économiques et de Gestion (LaRSEG) de l’Université de Kara au Togo. Ses travaux de recherche portent principalement sur l’économie du changement climatique, les politiques agricoles, la stabilité financière, les services financiers et les inégalités en Afrique subsaharienne. Il s’intéresse particulièrement aux interactions entre vulnérabilité climatique, systèmes sanitaires, inclusion financière et développement durable. Titulaire d’une formation en économie du développement et disposant d’expériences dans les études socioéconomiques, l’analyse des politiques publiques et la recherche appliquée, il mobilise des approches quantitatives avancées, notamment les méthodes de données de panel et les estimateurs GMM. Ses recherches visent à contribuer à la formulation de politiques publiques résilientes face aux défis climatiques et économiques en Afrique."
  website: ""

- name: "ILBOUDO Wendyam Fulbert"
  image: /assets/images/ilboudo_wendyam_fulbert.jpg
  bio: "ILBOUDO Wendyam Fulbert est doctorant en Géographie, avec une spécialisation en Démographie, à Université Joseph KI-ZERBO, au sein du laboratoire LERMIT. Ses travaux de recherche portent sur les dynamiques spatiales des inégalités de pauvreté multidimensionnelle dans les quartiers périurbains de Ouagadougou. Il est titulaire d’un Master of Engineering en Data Sciences obtenu à ISM Paris ainsi que d’un Master en Sciences de la Population de l’ISSP. Il exerce actuellement comme Assistant Technique Démographe à Institut National de la Statistique et de la Démographie, où il contribue notamment au pilotage des travaux d’estimation de la pauvreté à partir de données massives (Big Data) et d’approches géospatiales. Parallèlement à ses activités de recherche et d’expertise, il intervient comme enseignant en statistique et en biostatistique à l’IFRISSE. Ses centres d’intérêt scientifiques s’articulent autour des méthodes computationnelles appliquées à la mesure de la pauvreté, de l’analyse spatiale, de l’estimation sur petits domaines ainsi que de l’exploitation de sources de données non conventionnelles pour l’étude des inégalités urbaines."
  website: https://linkedin.com/in/wendyam-fulbert-ilboudo-0058811b3

- name: "KABORE Jacques"
  image: /assets/images/kabore_jacques.jpg
  bio: "Jacques KABORE est un chercheur en mathématiques appliquées, option statistique et probabilité. Actuellement chercheur postdoctoral à l'Université Norbert ZONGO, ses travaux de recherches portent principalement sur les méthodes statistiques avancées, les structures de dépendance et l’inférence statistique pour les données complexes. Il s’intéresse particulièrement aux copules, aux modèles max-stables ainsi qu’aux approches de modélisation adaptées aux phénomènes extrêmes et aux grands ensembles de données. Ses recherches combinent développements théoriques et implémentations computationnelles, principalement sous R, dans le but de proposer des méthodes efficaces pour l’analyse de données multidimensionnelles et dépendantes. Il s’intéresse également à l’apprentissage statistique, aux méthodes numériques et aux applications des modèles probabilistes à des problématiques réelles. Au cours de son parcours académique et scientifique, Jacques KABORE a participé à plusieurs initiatives de recherche, de formations et de colloques scientifiques internationales, renforçant ainsi son expertise en statistique moderne et en calcul scientifique. À travers ses travaux, il ambitionne de contribuer au développement de méthodes statistiques innovantes et à leur application dans des contextes scientifiques variés, tout en participant au rayonnement de la recherche scientifique africaine sur la scène internationale."
  website: https://orcid.org/0009-0009-6349-681X

- name: "KERE Arsène Quentin"
  image: /assets/images/kere_arsene_quentin.jpg
  bio: "Quentin Kéré est doctorant en Mathématiques Appliquées, spécialisé en Statistique et Modélisation Stochastique à l'Université Joseph KI-ZERBO (Burkina Faso). Il est titulaire d'un master en Mathématique Appliquées Informatique et Modélisation en Environnement, spécialité Statistique, et soutiendra bientôt un second master en Finance Quantitative et Gestion des Risques. Ses travaux de recherche portent principalement sur l'estimation non paramétrique des fonctions de masse de probabilité multivariées, à travers l'utilisation de noyaux associés discrets. Ses recherches visent à développer des méthodes statistiques avancées adaptées aux données discrètes et complexes, avec des applications en science des données et en modélisation des phénomènes socio-économiques. Sur le plan professionnel, il a occupé le poste de VAS Analyst chez Orange Burkina Faso, où il a contribué à l’analyse des revenus des services à valeur ajoutée, au suivi des indicateurs de performance et à la prise de décisions stratégiques basées sur les données. Il a également acquis une expérience significative dans le secteur bancaire à travers ses stages à Orabank et Coris Bank International, où il a travaillé sur l’analyse des risques, la conformité réglementaire, le credit scoring et la détection de fraude."
  website: https://www.linkedin.com/in/quentin-kere-69b923201

- name: "KRA Léandre Junias"
  image: /assets/images/kra_leandre_junias.jpg
  bio: "Je suis Docteur en Hydraulique agricole et Systèmes d’Information Géographique de l’Université Jean Lorougnon GUEDE (Daloa – Côte d’Ivoire). Je suis également titulaire d’un Master en Génie de l’Eau et de l’Environnement. Lauréat du projet PASRES (Programme d’Appui Stratégique à la Recherche Scientifique) en 2020 et de la Bourse Eugen Ionescu en 2024, mes recherches portent sur l’optimisation de l’irrigation et je m’intéresse à l’application de l’intelligence artificielle dans le domaine de l’agriculture, notamment pour la prévision des rendements agricoles et l’amélioration de l’efficience d’utilisation de l’eau relativement à l’objectif de développement durable 2 (ODD 2). J’ai présenté des communications orales et participé à plusieurs conférences internationales et je suis auteur et coauteur d’articles scientifiques. En parallèle à mes recherches, j’ai plus de quatre années d'expérience dans l’enseignement et l’encadrement académique."
  website: https://www.linkedin.com/in/l%C3%A9andre-junias-kra/

- name: "OUOBA Minamba Victorien"
  image: /assets/images/ouoba_minamba_victorien.jpg
  bio: "OUOBA Minamba Victorien est économiste et chercheur, actuellement doctorant en économie à l'Université Thomas SANKARA de Ouagadougou, au Burkina Faso. Il est titulaire d'un Master 2 en Macroéconomie et Gestion du Développement, obtenu au sein de la même institution. Ses travaux de recherche s'inscrivent dans le champ de l'économie appliquée, avec un intérêt particulier pour les questions de développement, de finance publique et d'économie de l'environnement. Elles portent principalement sur la gouvernance institutionnelle, les flux financiers illicites, la résilience économique, la dette souveraine et l'industrialisation. Il est membre actif du Laboratoire de recherche du CEDRES et Adjoint chargé de la recherche au sein du Centre d'Étude de Recherche pour le Développement Humain en Afrique (CERDHA). Son profil académique est renforcé par de nombreuses certifications dans des domaines aussi variés que l'analyse des données, la statistique du commerce international, la mobilisation des ressources intérieures et la science ouverte, obtenues auprès d'institutions reconnues telles que la CNUCED, l'IDEP et l'Université Virtuelle du Burkina Faso."
  website: https://www.linkedin.com/in/victorien-minamba-ouoba-a16660228

- name: "SERE Amal"
  image: /assets/images/placeholderPic.png
  bio: "Amal A. M. Sere is a PhD candidate in Economics at the Université de Montréal, specializing in industrial organization, applied econometrics, and development economics. Her research focuses on demand analysis, with ongoing projects on telecommunication and natural gas markets. She holds an M.Sc. in Probability and Statistics, jointly awarded by Université Félix Houphouët Boigny and Aix Marseille University, as well as an engineering degree (M.Sc.) in Statistics and Economics from INSEA in Rabat."
  website: https://www.linkedin.com/in/amal-sere-970008124

- name: "SINDAYIHEBURA Jean François Régis"
  image: /assets/images/sindayihebura_jean_francois_regis.jpg
  bio: "Jean François Régis SINDAYIHEBURA est diplômé de la 3ème Cohorte de l’Ecole doctorale de l’Université du Burundi, titulaire d’un Doctorat en Démographie obtenu en Septembre 2023. Habituellement, il travaille comme Enseignant-Chercheur à temps-plein à l’Université du Burundi, attaché au Département des Sciences Géographiques, de l’Environnement et de la Population, avec des interventions spécialisées en Statistiques Appliquées et Démographie. Détenant à la base le Diplôme de Master Professionnel en Démographie de l’Institut de Formation et de Recherche Démographiques (IFORD) - 39ème Cohorte, il justifie d'une capacité et d’une expérience professionnelle de collecte et d’analyse de données quantitatives et qualitatives, de suivi-évaluation, d’évaluation d’impact des projets et programmes de développement, etc. Il reste ouvert aux études de suivi-évaluation des projets, d’évaluation d’impact, de population et développement, de population et santé, de population et environnement, etc. et aux recherches collaboratives."
  website: https://www.linkedin.com/in/jean-fran%C3%A7ois-r%C3%A9gis-sindayihebura-ph-d-60526b14b

- name: "SOUMANOU Imourana"
  image: /assets/images/soumanou_imourana.jpg
  bio: "Imourana Soumanou est statisticien-économiste et assistant de recherche à l’Université d’Abomey-Calavi (Bénin). Il est titulaire d'une Licence en Statistique Appliquée de l'École Nationale de Statistique, de Planification et de Démographie (ENSPD) de l'Université de Parakou et d'un Master en Mathématiques, Économie et Statistique (MMES) de l'African School of Economics (ASE). Lauréat du prix du « Meilleur Poster » à la 9ème Conférence sur la population africaine au Malawi, ses travaux portent principalement sur l'inférence causale, l'économie du travail, les dynamiques de genre, la protection sociale et la modélisation des données en santé publique en Afrique de l'Ouest."
  website: https://www.linkedin.com/in/imourana-soumanou-2140ab138/

  - name: "TONGO Lanyiwè Lazare"
  image: /assets/images/Tongo_Lazare.jpg
  bio: "TONGO Lanyiwè Lazare est statisticien de formation,spécialisé en suivi-évaluation (MEAL) et en analyse avancée de données. Diplômé de l’Université Joseph Ki-Zerbo de Ouagadougou,il évolue au croisement des statistiques, des sciences sociales et du développement. Actuellement Data Manager MEAL au sein d'un Programme de recherche, Lazare orchestre la structuration, l'assurance qualité et la valorisation des données de terrain. Passionné par l’innovation technologique, Lanyiwè s'investit dans la modernisation des systèmes MEAL via l'intelligence artificielle et l'automatisation. Il a notamment conçu une plateforme de monitoring en temps réel, qui automatise le calcul et la visualisation d'indicateurs pour un pilotage stratégique. En parallèle, il applique des approches quantitatives avancées à l'étude des dynamiques démographiques et socio-économiques. Son ambition à long terme est de transformer le suivi-évaluation en Afrique grâce à des solutions analytiques de pointe, optimisant ainsi l'impact des politiques de développement. Au-delà de son expertise technique, il fait preuve d’un leadership actif pour l'autonomisation des jeunes professionnels."
  website: ""

- name: "YAMUREMYE Jean Bosco"
  image: /assets/images/yamuremye_jean_bosco.jpg
  bio: "Jean Bosco YAMUREMYE est détenteur d’un Diplôme de doctorat en Sciences de la Population, option « Population et Développement », obtenu en décembre 2025 à l'Institut de Formation et Recherche Démographiques (IFORD), Université de Yaoundé 2, au Cameroun. Actuellement enseignant à temps partiel à l'Université du Burundi et dans différentes autres universités au Burundi, Jean Bosco YAMUREMYE est le Chef de service « Recherche et Innovation Statistiques » à l’Institut National de la Statistique du Burundi (INSBU), ses recherches sont principalement axées sur le genre, la pauvreté, la migration, le marché du travail et le développement en vue d’éclairer les décideurs dans leur prise de décisions fondées sur les données probantes."
  website: ""

- name: "ZITTI Tony"
  image: /assets/images/zitti_tony.jpg
  bio: "Tony ZITTI est docteur en pharmacie et docteur en santé publique. Il est actuellement chercheur postdoctorant au laboratoire Centre Population et Développement (Ceped), qui est une UMR de l’Université Paris Cité (UPC), de l’Institut de Recherche pour le Développement (IRD), de l’Inserm, et de l’Université Sorbonne Paris Nord (USPN). Il est actuellement investigateur principal du projet de recherche EndoMigr (pour Endométriose et Migration) qui vise à comprendre les spécificités des parcours de vie et des trajectoires de soins des femmes immigrées originaires d'Afrique subsaharienne atteintes d'endométriose et vivant en Île-de-France. Ses travaux de recherche portent sur l’évaluation des interventions de renforcement des systèmes de santé en Afrique de l’ouest. Ses travaux portent également sur l’utilisation des connaissances scientifiques par les décideurs au Mali, à Madagascar et en France. Il s’intéresse de plus en plus à l’amélioration de l’accès aux soins de santé gynécologique des femmes, notamment les troubles gynécologiques bénins (endométriose, fibromes utérins, syndrome métabolique ovarien polyendocrinien anciennement appelé « syndrome des ovaires polykystiques (SOPK) ») chez les femmes en situation de migration en France et dans les pays du Sud. Il est membre fondateur du réseau TRansfert de connaissances pour l’ACTion (TRACT) en France. Il est membre collaborateur de l'Équipe Renard Recherche sur le transfert de connaissances, de l’Université de Montréal. Il est membre du Réseau Francophone International en Conseil Scientifique (RFICS)."
  website: https://www.linkedin.com/in/tony-zitti-mph-pharmd-phd-b521b3128
