- name: "Ify Okpali." # Replace with participant name.
  image: /assets/images/ify.png  # Add participant image to assets/images/ and update here.
  bio: "Ify Okpali is a dual-PhD candidate in Political Science and Communication at the University of Pennsylvania’s Annenberg School for Communication and Department of Political Science. Her research examines how digital media is reshaping the circulation of political information, as well as political accountability. She is particularly interested in the evolving roles of journalists, digital influencers, and other intermediary actors within increasingly social media-driven environments. Focusing on the African context, her dissertation aims to explore how the continent’s demographic youth bulge intersects with shifts in the digital media ecosystem to expand the range of voices shaping political interpretation, particularly among increasingly young and digitally connected citizens. Methodologically, she is a mixed-methods researcher, looking to integrate computational social science approaches, including computational text analysis and content analysis, with qualitative and field-based research methods."  # Add participant bio here.
  website: https://www.google.com  # Link participant website here.

- name: "Makambi Dennis." # Replace with participant name.
  image: /assets/images/ify.png  # Add participant image to assets/images/ and update here.
  bio: "He is a Biostatistician and Mathematical Statistician with expertise in statistical genetics, infectious disease modeling, Bayesian analysis, causal inference, and machine learning applications for health data. His current research focuses on developing and evaluating imputation methods for missing genome-wide expression data under the Hardy–Weinberg Equilibrium framework at Kisii University.He has extensive experience teaching undergraduate statistics and supporting interdisciplinary research through the application of advanced statistical and computational techniques. He is proficient in a range of analytical tools, including R, Python, STATA, SPSS, and Advanced Excel, which he utilizes for data management, statistical modeling, and evidence-based decision-making.His research interests span genomic epidemiology, spatial and spatiotemporal disease modeling, survey methodology, epidemiological data analysis, and public health analytics. He has actively contributed to malaria surveillance and infectious disease research projects, applying quantitative methods to address complex health challenges. In addition, he has presented his research findings at both regional and international scientific conferences.He is passionate about leveraging statistical, mathematical, and computational approaches to advance public health research, strengthen data-driven policy formulation, and develop innovative solutions to emerging challenges in health and data science.."  # Add participant bio here.
  website: https://www.google.com  # Link participant website here.

- name: "Grace Nzambali Kitonyi." # Replace with participant name.
  image: /assets/images/ify.png  # Add participant image to assets/images/ and update here.
  bio: "Grace Nzambali Kitonyi is an MSc candidate in Mathematical Epidemiology at the African Institute for Mathematical Sciences (AIMS) Rwanda, supported by a Mastercard Foundation Scholarship. Her research applies compartmental ODE models and machine learning classifiers to build a county-level cholera early warning system in Kenya, combining climate, NDVI, and WASH surveillance data to inform public health decision-making. She holds a BSc in Applied Mathematics from the University of Nairobi and has a background spanning epidemiological modelling, data analysis, cybersecurity, and computational methods. Grace is passionate about open-source tools, reproducible research, and the intersection of computational social science and public health. She is also a beVisioneers Fellow through the Mercedes-Benz Fund, contributing to community sustainability initiatives.."  # Add participant bio here.
  website: https://www.google.com  # Link participant website here.
  
