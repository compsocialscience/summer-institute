- name: "Dr. Amos Kipkorir Langat, Ph.D." # Add faculty name here.
  image: /assets/images/amos langat.jpg  # Add faculty image to assets/images/ and update here.
  bio: "Dr. Amos Kipkorir Langat is a Senior Research Fellow with a Ph.D. in Mathematics (Statistics) from the Pan African University Institute for Basic Sciences, Technology and Innovation (PAUSTI) and Jomo Kenyatta University of Agriculture and Technology (JKUAT). He currently serves as a Postdoctoral Research Fellow in Integrated Data Science and Health Informatics at the Centre of Excellence in Women and Child Health (CoEWCH-EA), Aga Khan University,Nairobi and as a Research Fellow under the Migration and Displacement Action Plan for Sub-Saharan Africa (MAPS), a collaborative initiative involving Sapienza University of Rome and Amref International University. He is also an Adjunct Research Scientist at the African Institute for Capacity Development (AICAD).Dr. Langat is actively engaged in teaching and academic mentorship across multiple institutions. He lectures in Statistics, Data Science, and Applied Mathematics at Jomo Kenyatta University of Agriculture and Technology (JKUAT), the Technical University of Kenya, and the Open University of Kenya. In addition, he contributes to postgraduate training and supervision at the African Institute for Mathematical Sciences (AIMS), including AMIS Cameroon, AIMS Rwanda and AIMS Senegal, where he supports MSc-level training in mathematical sciences, epidemiology, and data science. He has previously taught at Kabarak University and Maasai Mara University, where he contributed to curriculum development and postgraduate supervision.He is also a member of the KIPPRA Public Policy Professionals (PPP) Cohort 2026, reflecting his strong engagement in public policy analysis and evidence-based decision-making. Concurrently, he serves as a Senior Economist with the County Government of Bomet, where he leads data-driven policy planning and statistical analysis within the Economic Planning Division.Dr. Langat is widely recognized for his leadership in advancing computational social science and statistical capacity development in Africa. He is the Main Organizer of SICSS-Kenya 2025 and Co-Organizer of SICSS-Nairobi/Mathematica 2024, initiatives that promote advanced computational and data science skills among African researchers. As an alumnus of SICSS-Accra 2023, his expertise spans Bayesian statistics, machine learning, deep learning, agent-based modeling, natural language processing, and spatial epidemiology.His research portfolio includes over 70 peer-reviewed publications focusing on hierarchical Bayesian modeling, infectious disease modeling, climate-health interactions, financial analytics, survival analysis, and AI-driven forecasting systems. He has supervised MSc and Ph.D. students across Kenyan universities and AIMS centers, including Cameroon, Rwanda, and Senegal, and serves as a reviewer for several international journals.Dr. Langat has received multiple prestigious scholarships and research grants and is actively involved in large-scale interdisciplinary projects addressing climate change, migration, and public health in Africa. He is a member of leading statistical and data science societies and is fluent in English and French. Through his teaching, research, and policy engagement, he remains committed to advancing statistical innovation, data-driven decision-making, and research capacity across Africa." # Add faculty bio here.
  website: https://scholar.google.com/citations?user=lGVG7LYAAAAJ&hl=en&oi=ao  
    
- name: "Dr. Mary Muyonga, Ph.D." # Add faculty name here.
  image: /assets/images/mary.png  # Add faculty image to assets/images/ and update here.
  bio: "Dr. Mary Muyonga is a Population Scientist affiliated with the Population Studies and Research Institute, at the University of Nairobi, Kenya. Her research interests include migration, mobility, urbanization and policy linkages in which she has authored several articles and co-authored book chapters. She is a member of the International Union of Population Scientists (IUSSP) and the Union of African Population Scientists (UAPS).

Mary is a seasoned researcher and technical specialist with experience in migration research, gender, governance and social policy programming across East, West and Southern Africa. She has proven experience in providing technical guidance for multi-country projects, supporting program quality, monitoring and evaluation, and strengthening evidence-based programming for population, health, democratic governance and refugee, host and displaced populations. She has extensive work experience working with UN Agencies, World Bank and academic research institutions. She has secured and managed programs funded by Canada, Denmark and Sweden.

Mary is a firm believer in the SICSS vision of empowering social scientists with the computational tools and skills they need to conduct cutting-edge research at the intersection of social science and data science. Mary participated in the 2022 SICCS Program in Nigeria (https://sicss.io/2022/covenant-university/) and has since then curated the  expansion of the digital footprint of the SICSS program in East Africa. She was a co-organizer of the inaugural SICSS program in Kenya in 2024, the SICCS Nairobi Mathematica (Summer Institute in Computational Social Science) hosted at the University of Nairobi Kenya with sponsorship from Howard Mathematica and the University of California Berkeley. In the subsequent years, Mary has successfully co-organized, co-curated and expanded the SICSS Kenya program, attracting not only funding but expanding partnerships (https://sicss.io/2025/kenya /). " # Add faculty bio here.
  website:  https://scholar.google.com/citations?user=2Kp0neAAAAAJ&hl=en&oi=ao.

  

 
