- name: Hugo Medeiros
  image: /assets/images/hugo_medeiros_sicss.jpg
  bio: Hugo Medeiros holds a PhD in Education (UFPE), with postdoctoral research in Political Science (UFPE). He also holds a Licentiate Degree in History (UFPE), a Bachelor's Degree in Information Systems (UNESA), and an MBA in Data Science (DSA). He is a Government Planning Manager at the State Secretariat of Planning (SEPLAG-PE), where he currently serves as Director of Special Projects. He is also a Researcher at the Center of Excellence in Social Technologies (NEES) at the Federal University of Alagoas (UFAL).

