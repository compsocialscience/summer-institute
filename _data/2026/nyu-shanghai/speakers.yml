- name: "Yang Chen"
  image: /assets/images/nyushanghai2025/yangchen.jpg
  bio: "Yang Chen is a Professor within the College of Computer Science and Artificial Intelligence at Fudan University, and leads the Big Data and Networking (DataNET) group at Fudan. From April 2011 to September 2014, he was a postdoctoral associate at the Department of Computer Science, Duke University, USA, where he served as Senior Personnel in the NSF Mobility First project. From September 2009 to April 2011, he has been a research associate and the deputy head of Computer Networks Group, Institute of Computer Science, University of Goettingen, Germany. He received his B.S. and Ph.D. degrees from Department of Electronic Engineering, Tsinghua University in 2004 and 2009, respectively. He visited Stanford University (in 2007) and Microsoft Research Asia (2006-2008) as a visiting student. He was a Nokia Visiting Professor at Aalto University in 2019. His research interests include online social networks, Internet architecture and urban computing. He serves as a Senior Associate Editor of the ACM Transactions on Social Computing, an Associate Editor-in-Chief of the Journal of Social Computing, and an Editorial Board Member of Elsevier Computer Communications. He served as a OC / SPC / PC Member for many international conferences, including SOSP, SIGCOMM, WWW, IMC, IJCAI, AAAI, ECAI, DASFAA, IWQoS, ICCCN, GLOBECOM and ICC. He is a senior member of ACM/IEEE, and a Fellow of the Royal Geographical Society."
  website: https://chenyang03.wordpress.com/
  
- name: "Chuncheng Liu"
  image: /assets/images/nyushanghai2025/Chuncheng Liu.jpg
  bio: "Chuncheng Liu is an Assistant Professor of Communication Studies, jointly appointed in Sociology and Anthropology (CSSH) at Northeastern University. He is a sociologist of knowledge and technology whose research examines the politics of data and classification. He received his Ph.D. in Sociology and Science Studies from the University of California, San Diego, and previously served as a Postdoctoral Researcher at Microsoft Research New England. Liu's current research investigates the politics of sociotechnical systems that surveil, evaluate, and classify citizens. As a leading scholar of China's social credit system, his ongoing book project, under contract with the University of California Press, presents the first ethnographic study of a municipal social credit system that scores citizens based on behavioral indicators. Beyond this book, his broader research explores the organizational politics and public perceptions of contact tracing technologies, generative AI tools, and other data-driven systems of governance. Earlier in his career, Liu studied how public health institutions classify sexual minorities and COVID-19 cases, an interest rooted in his prior work on HIV/AIDS research and intervention. His research has appeared in leading journals including Big Data & Society, Information, Communication & Society, Journal of Contemporary China, Social Science & Medicine, Sociological Forum, and Science, Technology & Human Values. His work has been recognized with awards and grants from the American Sociological Association, the Association for Asian Studies, and the Horowitz Foundation for Social Policy, among others. Liu's insights have also been featured in media outlets such as The Guardian, Bloomberg, and Rest of World."
  website: https://www.chunchengliu.com/

- name: "Guoer Liu"
  image: /assets/images/nyushanghai2025/Guoer.jpg
  bio: "Guoer Liu is an Assistant Professor of Political Science at the University of California San Diego. She is affiliated with UCSD's 21st Century China Center and the Lieberthal-Rogel Center for Chinese Studies at the University of Michigan. She received her Ph.D. in Political Science and Scientific Computing from the University of Michigan in 2024. Her research sits at the intersection of political institutions, technology, and environmental politics, with a primary empirical focus on China. Her book project asks why governments turn to automation when it constrains the very discretion that makes political power useful. She also conducts research in political methodology, with a focus on causal inference and survey experiments."
  website: https://www.guoerliu.com/

- name: "Hua Shen"
  image: /assets/images/nyushanghai2025/Hua Shen.jpeg
  bio: "Hua Shen is an Assistant Professor of Computer Science at NYU Shanghai, jointly affiliated with New York University. Her research lies at the intersection of Human-Computer Interaction and multiple AI fields, including Natural Language Processing, Speech Processing, and Machine Learning. Particularly, she led a team to initiate research on Bidirectional Human-AI Alignment, aiming to empower humans to interactively explain, evaluate, and collaborate with AI, while incorporating human feedback and values to improve AI systems. She has been selected for the 2026 Google Gemini Academic Program Award, four Shanghai Talent Award programs, and the 2023 Rising Stars of Data Science. Her papers have received multiple honors, including the CHI 2026 Best Paper Honorable Mention Award, EMNLP 2025 Outstanding Paper Award, Best Paper Award at AIED 2024, Best Demo Award at CSCW 2023, Best Paper Honorable Mention at IUI 2023, and a Google Research Science Conference Scholarship (2023). She received her Ph.D. from The Pennsylvania State University and was previously a postdoctoral scholar at the University of Washington and the University of Michigan."
  website: https://hua-shen.org

- name: "Celine Yunya Song"
  image: /assets/images/nyushanghai2025/Celine Yunya Song.jpg
  bio: "Prof. Celine Yunya Song is a Full Professor in the Academy of Interdisciplinary Studies and Director of the Media Intelligence Research Center at the Hong Kong University of Science and Technology (HKUST). Her research cuts across global communication, digital media, social media analytics, cyber-psychology and behavior. With an extensive track record in pursuing interdisciplinary research, her scholarship has straddled English, French and Chinese cultures and media. She is a two-time recipient of the prestigious Fulbright award. Her research has been awarded a series of internal and external grants, including from the Humanities and Social Sciences Prestigious Fellowship Scheme, General Research Fund, Quality Education Fund, and Public Policy Research Fund, as well as external grants from Ryerson University, Canada, L'Universite Paris Nanterre, France, FMSH, France and the CONVERGE COVID-19 Working Group Award, USA. She received the HKBU President's Award for Outstanding Young Researchers in 2017 and the HKBU President's Award for Outstanding Performance in Scholarly Work in 2023. She was a visiting associate professor at Cornell University from 2019 to 2020."
  website: https://facultyprofiles.hkust.edu.hk/profiles.php?profile=celine-yunya-song-yunyasong

- name: "Xi Song"
  image: /assets/images/nyushanghai2025/Xi Song.jpg
  bio: "Xi Song is a Professor of Sociology and a faculty member of the Asian American Initiative at Columbia University. Prior to joining Columbia, she was the Schiffman Family Presidential Professor of Sociology and a faculty member of the Graduate Group in Demography at the University of Pennsylvania. Her research interests include social mobility, occupations and work, Asian Americans, population studies, and quantitative methodology. Song received the 2021 William Julius Wilson Early Career Award from the American Sociological Association. Her publications received multiple awards from the American Sociological Association (ASA), the International Sociological Association Research Committee on Social Stratification and Mobility (ISA-RC28), the Integrated Public Use Microdata Series (IPUMS), and Demographic Research. She received the Mentor of the Year Award from the Department of Sociology at the University of Pennsylvania in 2022. She has served on the editorial boards of the American Journal of Sociology, Demography, Sociological Methodology, Social Science Research, and Research in Social Stratification and Mobility."
  website: https://xisong.me/

- name: "Muzhi Zhou"
  image: /assets/images/nyushanghai2025/Muzhi Zhou.jpg
  bio: "Dr. Muzhi Zhou is an Assistant Professor in the Urban Governance and Design Thrust at the Hong Kong University of Science and Technology (Guangzhou). Previously, she was a postdoctoral researcher at the Department of Sociology, University of Oxford, supported by the European Research Council. She has expertise in the field of family and gender, life course and digital inequality. Her recent work focuses on how social inequalities are reflected in the digital and virtual society. Her work has been published in top journals such as Gender & Society, Population and Development Review, Journal of Marriage and Family, and several international flagship computer science conferences."
  website: https://facultyprofiles.hkust-gz.edu.cn/faculty-personal-page/ZHOU-Muzhi/mzzhou
