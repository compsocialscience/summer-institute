- date: "12 June 2026"
  title: "Program and Participant Description Update"
  body: "Here are some updates on what we have been working on this week to make this summer (winter) institute even more fabulous:<br><br>Speaker and participant descriptions: We have included brief descriptions for each participant at https://sicss.io/2026/melbourne/speakers_and_participants. Please scroll down to the participants section to check if your description is correct. If you would like us to make any corrections, just reply to this email with the changes you want.<br><br>Schedule update: Our program is now mostly complete! Please check out our latest schedule at https://sicss.io/2026/melbourne/schedule<br><br>Social events: We have arranged two events for us to hang out, talk, walk, eat, and socialise:<br><br>Trivia night at Oxford Scholar (across the road from the venue - https://www.theoxfordscholar.com.au) on Monday, June 22nd after the last session. Feel free to play or just join for a chat! We will head over right after our final session and officially kick things off at 17:30.<br><br>Dights Falls Cultural Tour - a 2-hour walking tour (https://www.wurundjeri.com.au/services/education-tours-cross-cultural-awareness-training/cultural-walks-and-experiences/), which will be a great opportunity to enjoy a nice walk and learn about the history of the area. We will also invite people from ADM+S and AIO to join, so it will be a lot of fun!<br><br>Please do not forget to fill out the onboarding form at https://forms.gle/GyssxzUh4iT4dCsw7 and join our Discord at https://discord.gg/qXAT2wUK - Melbourne channel.<br>We look forward to seeing you all soon in just a couple of weeks!"

- date: "05 June 2026"
  title: "Training Materials Available!"
  body: 'We have made a list of relevant readings and websites that will help you prepare for our program this year - check it out in the Training Materials section. If you have suggestions or further contributions, feel free to send them.<br>We have slightly restructured our program, so make sure to have a look at the schedule to see the latest updates. The schedule is pretty much finalised; however, we may add a few other sessions and more detailed descriptions to the existing ones.<br>Also, please fill out the following form when you have time:<br><a href="https://forms.gle/GyssxzUh4iT4dCsw7" target="_blank"><b>https://forms.gle/GyssxzUh4iT4dCsw7</b></a><br>This form is useful for SICSS organisers to keep everyone involved and make sure to include everyone in our international community.<br>Look forward to seeing you all soon in just a couple of weeks!'


- date: "27 May 2026"
  title: "Welcome to SICSS-Melbourne 2026!"
  body: "We are excited to welcome you to the Summer Institute in Computational Social Science – Melbourne. This page will be updated regularly with announcements, logistics, and resources for participants. Stay tuned!"
