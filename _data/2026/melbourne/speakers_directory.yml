  affiliation: "GESIS, Germany"
  profile_url: "https://ahrkat.github.io/"
  bio: "Ahrabhi a Postdoctoral Research Associate at GESIS – Leibniz Institute for the Social Sciences in Germany, working within the Computational Social Science department and the Transparent Social Analytics team. Her research operates at the intersection of political communication and computational methods, specifically focusing on social bias, automated racism detection, and the dynamics of polarization and migration in mediated and parliamentary discourses."
  sessions:
