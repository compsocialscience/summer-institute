  bio: "Laura is a PhD researcher at RMIT and Newsroom Innovation Lead at ABC News. As a former investigative digital producer for ABC's Four Corners, she specialised in creative, inclusive, and long-form storytelling. Following her Reuters Journalism Fellowship at the University of Oxford—where she researched editorial algorithms and public-interest journalism—her current work operates at the intersection of technology and media, guiding newsrooms to adopt emerging formats and AI responsibly."
