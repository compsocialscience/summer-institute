  bio: "Ariel is a Data Scientist at the Australian Broadcasting Corporation (ABC), where his work operates at the intersection of public-service journalism, data science, and AI. With a background in physics and extensive experience deploying scalable machine learning and natural language processing (NLP) pipelines, he focuses on developing data-driven products and collaboration models that align technical capabilities with editorial goals to personalize the news responsibly."
  sessions:
