- name: Danye Medhin
  image: /assets/images/medhinphoto.jpg
  bio: "Danye Medhin is an Assistant Professor of Criminal Justice at Bethune Cookman University and a policy analyst specializing in drug policy and criminal justice reform. He earned his PhD in Criminology from Georgia State University. His research blends casual inference and policy analytics, with a focus on how legal changes shape patterns of enforcement and inequality. Danye works extensively with large scale administrative datasets, including the FBI’s National Incident Based Reporting System (NIBRS) and the Uniform Crime Reports (UCR). His current work applies multiple imputation on a massive scale to address item level missingness in NIBRS, substantially improving its usability for policy analysis. Ultimately, this work will support a broader research agenda aimed at estimating the causal effects of cannabis legalization and related policies on arrest patterns across demographic groups. Outside of his academic work, Danye is an avid NBA 2K player, where he and his son lead a highly competitive crew."
  website: https://www.linkedin.com/in/danye-medhin-ph-d-9655488b/
