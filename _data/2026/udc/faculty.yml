- name: "Andrea Adams, Ph.D., J.D., M.B.A."
  image: /assets/images/andrea_adams.jpg
  bio: "Andrea Adams is an Associate Professor and Program Coordinator of Crime, Justice, and Security Studies at the University of the District of Columbia (UDC). A licensed attorney specializing in employment and labor law, she leads a multidisciplinary research agenda exploring the ethical intersections of data privacy, emergency management, and gender-based violence. Dr. Adams attended the SICSS Summer Institute in 2022 and served as a fellow in 2023. She has led externally funded projects for DC government agencies including the Mayor’s Office of Returning Citizen Affairs and the Department of Health Care Finance. Her international collaborations focus on digital technologies addressing sexual violence in rural contexts, and she serves as Co-Chair of the Higher Education Ethics Special Interest Group."
  website: "https://www.udc.edu/directory/profiles/cas/andrea-adams"

- name: "Cotina Lane Pixley, M.S."
  image: /assets/images/cotina_lane.jpg
  bio: "Professor Cotina Lane Pixley is a Clinical Instructor in the Crime, Justice, and Security Studies Program at the University of the District of Columbia. She has served as a full-time faculty member since 2014 and is a scholar-practitioner whose work advances applied teaching, externally funded research, and service to homeland security and emergency management partners. Her leadership includes federally funded projects supported by DHS and FEMA, including the Designing Actionable Solutions for a Secure Homeland (DASSH) Hackathons and the Invent2Prevent initiative addressing targeted violence prevention. She also served as Co-PI on a FEMA Higher Education award examining climate change impacts on emergency management and co-authored Climate Change for Emergency Managers. Her scholarship further includes the co-authored book Twenty Years of School-Based Mass Shootings in the United States: Columbine to Santa Fe and peer-reviewed research on homelessness, COVID-19, and community resilience."
  website: "https://www.udc.edu/directory/profiles/cas/cotina-lane"

- name: "Angelyn Spaulding Flowers, Ph.D., J.D."
  image: /assets/images/angelyn_flowers.jpg
  bio: "Angelyn Spaulding Flowers is a computational social scientist and Division Chairperson for Social and Behavioral Sciences at the University of the District of Columbia. She is a Professor of Crime, Justice, and Security Studies, Founding Director of the graduate Homeland Security program, and Co-Founder and Director of the Institute for Public Safety and Justice. Her research applies complex systems frameworks and computer simulations to study crime, terrorism, radicalization, and social destabilization. She is the author of White Christian Nationalism in the United States: A Rising Tide Sinks All Boats and lead author of Twenty Years of School-Based Mass Shootings in the United States: Columbine to Santa Fe. Her federally funded work with DHS and FEMA focuses on critical infrastructure, terrorism, and climate impacts on emergency management, and her national training programs have reached over 1,200 emergency managers."
  website: "https://www.udc.edu/directory/profiles/cas/angelyn-flowers"

- name: "Tayler Shreve, M.A."
  image: /assets/images/tayler_shreve.jpg
  bio: "Tayler Shreve is a Clinical Instructor in Crime, Justice, and Security Studies at the University of the District of Columbia and a doctoral student in Public Policy and Administration at Virginia Commonwealth University. Her research focuses on juvenile justice policy, nonprofit governance, and data-driven approaches to public safety and equity. She teaches undergraduate and graduate courses in research methods, program evaluation, and criminal justice policy while integrating computational social science and applied data analysis into her teaching. Her work emphasizes translating data into actionable insights for community organizations and public agencies."
  website: "https://www.udc.edu/directory/profiles/cas/tayler-shreve"

