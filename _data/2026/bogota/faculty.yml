- name: "Sergio Sánchez" # Add faculty name here.
  image: assets/images/sergio_col_2026.jpeg # Add faculty image to assets/images/ and update here.
  bio: "Sociologist from Universidad del Rosario. He holds a Master degree in Economics for public policy. Sergio is an expert consultant in Social Appropriation of Knowledge (SAK) and innovation in healthcare. He leads at IDCBIS (Instituto Distrital de Biotecnología e Innovación en Salud) BioSignal, a mHealth system designed to preventively mitigate the risk of suicide among young people in Bogotá, integrating digital phenotyping and machine learning." # Add faculty bio here.
