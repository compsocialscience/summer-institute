- name: "Isabella Jaimes" # Add faculty name here.
  image: assets/images/isabella_col_2026.jpeg  # Add faculty image to assets/images/ and update here.
  bio: "Sociologist and Political Scientist from Universidad del Rosario. She is currently a PhD student in Information at the University of Toronto and holds a Master’s degree in Science and Technology Studies (STS) from York University, Toronto, Canada. She has worked as a lecturer at Pontificia Universidad Javeriana, where she taught courses on data narrative visualization and strategic information for organizations. Her research examines how digital platforms shape domestic work and care economies among Latina immigrant workers. Drawing on feminist STS and human–computer interaction, she studies platform-mediated labour, informal infrastructures of safety and accountability, and worker-centered technological design." # Add faculty bio here.
  website: https://www.linkedin.com/in/isabella-jaimes-rodr%C3%ADguez-020508218/  # Link faculty website here.

