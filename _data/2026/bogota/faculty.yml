- name: "Alejandro Sarria" # Add faculty name here.
  image: assets/images/alejandro_col_2026.jpeg  # Add faculty image to assets/images/ and update here.
  bio: "Psychologist from Universidad del Los Andes. PhD student in the department of sociology at Duke University, where He is member of the Worldview Lab and the Polarization Lab. Alejandro is interested in the use of statistical and computational methods to study politics and culture. Currently, his research focuses on modelling the behavior of political ideology and other cultural systems through natural language processing, statistical methods and cross-cultural analysis. Before Duke, he got a master of arts in Computational Social Science at the University of Chicago." # Add faculty bio here.
  website: https://alejandro-sarria-morales.github.io/  # Link faculty website here.

