- name: "Oscar J. Maldonado C." # Add faculty name here.
  image: assets/images/oscar_col_2026.jpeg  # Add faculty image to assets/images/ and update here.
  bio: "Oscar Javier Maldonado Castañeda is Associate Professor in the Department of Sociology at Universidad del Rosario (Bogotá, Colombia). He has a Ph.D. in Sociology from Lancaster University and has been postdoctoral researcher at the Institute for Technology and Social Change (TEMA) at Linköping University (Sweden), visiting researcher at the TANTLab (Digital Methods Laboratory) at Aalborg University in Copenhagen (Denmark), visiting professor in the Social and Human Sciences Graduate School at the National University of Colombia, Fellow of the Summer Program in Social Science at the Princeton Institute of Advanced Studies -IAS- (2020-2023) and Global South Visiting Fellow at the College of Arts and Social Sciences, Australia National University (2025)." # Add faculty bio here.
  website: https://www.linkedin.com/in/oscar-javier-maldonado-casta%C3%B1eda-61107b14/  # Link faculty website here.

