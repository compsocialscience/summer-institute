- name: "Victor M. Hernandez L." # Add faculty name here.
  image: assets/images/victor_col_2026.jpg  # Add faculty image to assets/images/ and update here.
  bio: "Sociologist from Universidad del Rosario, with a Master's degree in Applied Statistics and Data Science from Universidad El Bosque, and a Specialization in Artificial Intelligence from Universidad Javeriana. He is the Chair of the undergraduate degree in Sociology at the Fundación Universitaria del Área Andina. He has extensive experience as a lecturer at various universities in Bogotá, teaching subjects such as data visualization, data science, computational sociology, and research methodology. His research interests focus on the analysis of machine learning algorithms for classification automation, the use of programming in research, and education, among others. He has worked as a consultant on business innovation and as a methodological consultant for public opinion analysis projects." # Add faculty bio here.
  website: https://www.linkedin.com/in/v%C3%ADctor-manuel-hern%C3%A1ndez-l%C3%B3pez-7b181aa4/  # Link faculty website here.

