  bio: " Mathieu Jacomy is a computational social scientist and assistant professor at Aalborg University, where he is affiliated with the Department of Culture and Communication, the Techno-Anthropology Lab, and MASSHINE. He is widely recognized for his contributions to digital methods, network visualization, and tool building for the social sciences and humanities. Before joining Aalborg, he worked as a research engineer at the médialab of Sciences Po, a major hub for digital social research and controversy mapping. Jacomy is best known internationally as one of the key developers associated with Gephi and as the lead author of the influential ForceAtlas2 article, which helped establish one of the most widely used layout algorithms in visual network analysis. His doctoral thesis, Situating Visual Network Analysis (Aalborg University, 2021), offers a major methodological reflection on how network images are interpreted, what they make visible, and how visual exploration can function as a form of inquiry. More recently, his work has extended to computational methods for studying AI and language models, including research on LLM self-consistency and the epistemic limits of machine-generated knowledge. " # add speaker bio here
