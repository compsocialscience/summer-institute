  bio: "Professional and master in Statistical Sciences from the National University of Colombia, and PhD in Statistics and Applied Mathematics from the University of California, Santa Cruz (USA). He is currently an associate professor at the Department of Statistics of the National University of Colombia. Her research focuses on Bayesian statistics, with emphasis on network analysis, text mining, record linking, and longitudinal data analysis, among others. His work combines the development of new methodologies with applications in social science, political science, finance, economics, and health sciences." # add speaker bio here
